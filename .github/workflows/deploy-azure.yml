# ==============================================================================
# CI/CD Pipeline - Cabinet Agent Entretien -> Azure Container Apps
# ==============================================================================
# Prerequisites:
#   1. Azure AD App with Contributor role on subscription + federated credentials
#      (OIDC login, no client secret) for repo:<org>/<repo>:ref:refs/heads/main
#      and repo:<org>/<repo>:pull_request
#   2. GitHub Secrets configured:
#      - AZURE_CLIENT_ID
#      - AZURE_TENANT_ID
#      - AZURE_SUBSCRIPTION_ID
#      - AZURE_RESOURCE_GROUP
#      - ACR_NAME (Azure Container Registry name)
#      - ACR_USERNAME / ACR_PASSWORD (admin credentials, `az acr credential show`)
#      - ACA_NAME (Azure Container App name)
#      - ACA_ENVIRONMENT (Container Apps Environment name)
#      - OPENAI_API_KEY
#      - PERPLEXITY_API_KEY
#      - GAMMA_API_KEY
#      - INSEE_API_KEY (optional)
# ==============================================================================

name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  IMAGE_NAME: cabinet-agent-entretien
  PYTHON_VERSION: '3.11'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Test
  # ---------------------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      
      - name: Run tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Build & Push to ACR
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Generate image metadata
        id: meta
        run: |
          # Generate tag based on branch/PR
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          else
            TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          fi
          echo "tags=$TAG" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Azure Container Apps
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ACA
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Deploy to Container Apps
        run: |
          az extension add --name containerapp --upgrade --only-show-errors

          az containerapp secret set \
            --name ${{ secrets.ACA_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --secrets \
              openai-api-key=${{ secrets.OPENAI_API_KEY }} \
              perplexity-api-key=${{ secrets.PERPLEXITY_API_KEY }} \
              gamma-api-key=${{ secrets.GAMMA_API_KEY }} \
              insee-api-key=${{ secrets.INSEE_API_KEY }}

          az containerapp registry set \
            --name ${{ secrets.ACA_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ env.REGISTRY }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

          az containerapp update \
            --name ${{ secrets.ACA_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              OPENAI_API_KEY=secretref:openai-api-key \
              PERPLEXITY_API_KEY=secretref:perplexity-api-key \
              GAMMA_API_KEY=secretref:gamma-api-key \
              INSEE_API_KEY=secretref:insee-api-key \
              LLM_MODEL=gpt-4o \
            --cpu 1.0 --memory 2.0Gi \
            --min-replicas 1 --max-replicas 3
      
      - name: Get Container App URL
        id: url
        run: |
          URL=$(az containerapp show \
            --name ${{ secrets.ACA_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo "::notice::Deployed to https://$URL"
      
      - name: Health check
        run: |
          URL="${{ steps.url.outputs.url }}"
          echo "Waiting for deployment to be ready..."
          sleep 30
          
          for i in {1..10}; do
            if curl -sf "${URL}/_stcore/health"; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          
          echo "Health check failed after 10 attempts"
          exit 1

  # ---------------------------------------------------------------------------
  # Job 4: Notify (Optional - for Slack/Teams)
  # ---------------------------------------------------------------------------
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always() && needs.deploy.result == 'success'
    
    steps:
      - name: Deployment Success
        run: |
          echo "::notice::Deployment successful!"
          echo "Image: ${{ needs.build.outputs.image_tag }}"
          echo "SHA: ${{ github.sha }}"